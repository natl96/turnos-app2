<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Turnos PRO Santander</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-950 to-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md mx-4">
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-4xl text-white">📋</div>
    </div>
    <h1 class="text-4xl font-bold text-center mb-2">Turnos PRO</h1>
    <p class="text-center text-gray-500 mb-8">Santander • Inicia sesión</p>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
        <input id="username" type="text" placeholder="admin o asesor01" 
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 text-lg">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" 
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 text-lg">
      </div>

      <button onclick="login()" 
              class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white text-xl font-semibold rounded-3xl transition">
        Iniciar sesión
      </button>
    </div>

    <div class="text-center mt-8 text-sm text-gray-500">
      Demo:<br>
      <strong>admin</strong> / admin123 → Panel Administrador<br>
      <strong>asesor01</strong> / 1234 → Panel Asesor
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('Ingresa usuario y contraseña');
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect;
        } else {
          alert(data.message || 'Credenciales incorrectas');
        }
      } catch (err) {
        alert('Error de conexión. Intenta de nuevo.');
      }
    }

    // Permite presionar Enter
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
